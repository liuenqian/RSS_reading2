name: Build & Release

# Trigger on tag pushes that look like a version, e.g. v0.2.0, v1.0.0-beta.1.
# We deliberately don't auto-build on every commit — that would burn CI minutes
# and clutter Releases. Tag → release is the explicit signal.
on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the workflow without cutting a release.
  # Run via GitHub UI: Actions → Build & Release → Run workflow.
  workflow_dispatch:

# Need permission to upload built artifacts to GitHub Releases.
permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel the macOS build just because the Windows build failed
      # (or vice versa). Each platform stands on its own.
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M-series). The previous v0.1.0 DMG was already
          # this target, so we keep it as the primary mac build.
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-AppleSilicon
          # Windows x64. WebView2 is preinstalled on windows-latest images, so
          # no extra setup needed.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Speeds up subsequent runs by caching Cargo's registry and the
      # `src-tauri/target` directory. First run still takes ~5 min; cached
      # runs drop to ~2 min.
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build with Tauri
        # `tauri-action` handles the build + bundle + (optional) release
        # upload in one step. We point it at the existing tag so it attaches
        # all generated installers to that release.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          # If this run was triggered by a tag, attach artifacts to that
          # tag's release (creating it if needed). On manual dispatch this is
          # ignored and the binaries just stay as workflow artifacts.
          tagName: ${{ github.ref_name }}
          releaseName: 'RSS Reading ${{ github.ref_name }}'
          # Don't auto-publish — we want to manually review the draft on
          # GitHub first (e.g. fill in release notes, mark as pre-release).
          releaseDraft: true
          prerelease: false

      - name: Create Windows portable package
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content 'src-tauri/tauri.conf.json' | ConvertFrom-Json).version
          $releaseDir = 'src-tauri/target/${{ matrix.target }}/release'
          $portableRoot = Join-Path $releaseDir 'portable'
          $portableDir = Join-Path $portableRoot 'RSS-Reading-Windows-x64'
          $archive = Join-Path $portableRoot "RSS-Reading_${version}_Windows-x64_Portable.zip"
          $checksum = "$archive.sha256"

          Remove-Item $portableDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item $portableDir -ItemType Directory -Force | Out-Null
          Copy-Item (Join-Path $releaseDir 'cento.exe') (Join-Path $portableDir 'RSS Reading.exe')
          Copy-Item 'src-tauri/resources' (Join-Path $portableDir 'resources') -Recurse
          Copy-Item 'docs/WINDOWS_PORTABLE.md' (Join-Path $portableDir '使用说明.md')

          Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $archive -Force
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $archive -Leaf)" | Set-Content $checksum -Encoding ascii

      - name: Upload Windows portable package to release
        if: matrix.platform == 'windows-latest' && github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $portableRoot = 'src-tauri/target/${{ matrix.target }}/release/portable'
          $archive = Get-ChildItem $portableRoot -Filter '*.zip' | Select-Object -First 1
          $checksum = Get-ChildItem $portableRoot -Filter '*.sha256' | Select-Object -First 1
          if (-not $archive -or -not $checksum) {
            throw 'Windows portable package or checksum is missing'
          }
          gh release upload '${{ github.ref_name }}' $archive.FullName $checksum.FullName `
            --clobber --repo '${{ github.repository }}'

      # Also upload the raw binaries as workflow artifacts so we can grab
      # them even if the release upload step had an issue.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/portable/*.zip
            src-tauri/target/${{ matrix.target }}/release/portable/*.sha256
          if-no-files-found: ignore
